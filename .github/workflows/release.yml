name: release

# Build prebuilt binaries on every v* tag push and attach them to the
# corresponding GitHub Release. No cargo-dist — the matrix builds
# natively on GitHub-hosted runners (no cross-compilation of the
# bundled DuckDB C++ tree, which is finicky).
#
# Targets shipped today:
#   - x86_64-unknown-linux-gnu  (ubuntu-22.04, native)
#   - x86_64-apple-darwin       (macos-13, native)
#   - aarch64-apple-darwin      (macos-14, native)
#
# aarch64-unknown-linux-gnu is intentionally omitted. GitHub's
# ubuntu-24.04-arm runners are still preview and DuckDB's bundled
# C++ build does not cross-compile cleanly. Add it back once
# ubuntu-*-arm goes GA.

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          # x86_64-apple-darwin is intentionally omitted from v1.0: the
          # macos-13 free runner pool is heavily backlogged (30+ minute
          # queue times) and Intel Macs are a shrinking share of the
          # user base. Will be re-enabled once GitHub provisions more
          # macos-13 capacity or once cross-compilation from M1 works
          # with the bundled DuckDB tree.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev libdbus-1-dev pkg-config
          # bindgen needs LIBCLANG_PATH; pick whichever llvm-N is installed.
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          if [ -z "$llvm_dir" ]; then
            echo "no llvm- directory found under /usr/lib" >&2
            exit 1
          fi
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        # The binary crate ships on crates.io as `narwhaldb` (the bare
        # `narwhal` slot is squatted). The installed binary is still
        # `narwhal` via `[[bin]] name`.
        run: cargo build --release --locked --target ${{ matrix.target }} -p narwhaldb

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="narwhal-${version}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/narwhal" "${staging}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${staging}/" 2>/dev/null || true
          tar -C dist -czf "${name}.tar.gz" "${name}"
          # macOS runners don't ship GNU coreutils, so prefer shasum which
          # is present on both Linux and macOS and emits the same
          # `<digest>  <file>` format that GNU sha256sum produces.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: narwhal-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha256 }}

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

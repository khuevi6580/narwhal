name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev libdbus-1-dev pkg-config
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev libdbus-1-dev pkg-config
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  integration:
    name: integration (docker)
    # Spin up the database services the `#[ignore]` integration tests
    # need. Triggered manually via workflow_dispatch (push runs would
    # cost a couple of extra runner-minutes per commit for no signal
    # on PR-day changes that don't touch driver code).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: narwhal
          POSTGRES_DB: narwhal_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: narwhal
          MYSQL_DATABASE: narwhal_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -pnarwhal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports: ["8123:8123", "9000:9000"]
        options: >-
          --health-cmd "wget -qO- localhost:8123/ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev libdbus-1-dev pkg-config
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace -- --ignored --test-threads=1

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev libdbus-1-dev pkg-config
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  audit:
    name: cargo-deny (advisories + licences)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The `check` action installs cargo-deny once per runner image
      # and applies the rules in `deny.toml` at the repository root.
      # `advisories`, `bans`, `licenses` and `sources` all run; any
      # match fails the job.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

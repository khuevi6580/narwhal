name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  integration:
    name: integration (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace -- --ignored --test-threads=1

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev
          llvm_dir=$(ls -d /usr/lib/llvm-* 2>/dev/null | sort -V | tail -1)
          echo "LIBCLANG_PATH=${llvm_dir}/lib" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
